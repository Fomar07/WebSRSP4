<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>WebSRSP4 | Vue Quest Lab</title>
    <meta
      name="description"
      content="Интерактивное демо по Vue.js для СРСП №4: компоненты, реактивность, props и логика квеста."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        font-family: "Manrope", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(242, 164, 72, 0.28), transparent 32%),
          radial-gradient(circle at top right, rgba(42, 157, 143, 0.24), transparent 28%),
          linear-gradient(180deg, #f6f2ea 0%, #efe6d7 100%);
        color: #132238;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
      }

      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(620px, 100%);
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(19, 34, 56, 0.1);
        box-shadow: 0 28px 60px rgba(19, 34, 56, 0.12);
        backdrop-filter: blur(18px);
      }

      .boot-card h1 {
        margin: 0 0 12px;
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1;
      }

      .boot-card p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.7;
        color: rgba(19, 34, 56, 0.82);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-screen">
        <div class="boot-card">
          <h1>Vue Quest Lab</h1>
          <p>
            Загружается интерактивное демо по теме современных front-end
            фреймворков и Vue.js.
          </p>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
  </html>
